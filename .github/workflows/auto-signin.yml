name: Auto_checkin Workflow

on:
  schedule:
    # 设置定时触发规则，每5分钟执行一次
   - cron: "0 8 * * *"  # 每天早上 8 点执行
  push:
    # 每次向 main 分支推送时触发
    branches:
      - main

jobs:
  auto-signin:
    runs-on: ubuntu-latest  # 使用最新版本的 Ubuntu 环境
    
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # 3. 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt  # 安装所有依赖

      # 4. 执行自动签到脚本
      - name: Run auto sign-in script
        run: |
          python auto_checkin.py  # 直接调用位于根目录的脚本

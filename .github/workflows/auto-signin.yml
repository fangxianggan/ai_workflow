name: Auto_checkin Workflow

on:
  schedule:
  - cron: "*/5 * * * *"   # 每5分钟一次
  workflow_dispatch:  # 支持手动执行
    

jobs:
  auto-signin:
    runs-on: ubuntu-latest  # 使用最新版本的 Ubuntu 环境
    
    steps:
     # 1 设置环境
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      # 2. 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt  # 安装所有依赖

      # 3. 执行自动签到脚本
      - name: Run auto sign-in script
        env:
         VIEWTURBO_EMAIL: ${{ secrets.VIEWTURBO_EMAIL }}
         VIEWTURBO_PASSWORD: ${{ secrets.VIEWTURBO_PASSWORD }}
        run: |
          python auto_checkin.py run # 直接调用位于根目录的脚本

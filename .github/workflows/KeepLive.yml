name: Keepalive

on:
  schedule:
    # 北京时间每月1号上午8点 (UTC 0:00) 执行一次
    - cron: '0 0 1 * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: gautamkrishnar/keepalive-workflow@v2
        with:
          committer_username: "fangxianggan"
          committer_email: "1097177647@qq.com"
